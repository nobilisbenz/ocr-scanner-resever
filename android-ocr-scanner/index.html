<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OCR Scanner</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <video id="camera" autoplay playsinline></video>
    <canvas id="ocrCanvas"></canvas>
    <div id="highlightLayer"></div>

    <div id="connection-status" class="disconnected"></div>

    <!-- Settings/IP Modal -->
    <div id="settings-modal" style="display: none;">
        <input type="text" id="ip-input" placeholder="Desktop IP (e.g. 192.168.1.5)" />
        <button id="save-ip">Connect</button>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>
